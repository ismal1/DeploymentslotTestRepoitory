name: Build and deploy ASP app to Azure Web App - dpslotwebsite

on:
  push:
    branches:
      - Staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DCAD6A30466E44B19C6F4EA0A6969A56 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_01305C8C7B114C0C8C9A11387F5BCDD7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C6C2A711FDD84BADAF1AC0C3C3C2FC82 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'stagingdpslot'
          slot-name: 'stagingdpslot'
          package: '.'
